<div class="page-container">
  <div class="page-header">
    <h1><mat-icon>people</mat-icon> User Management</h1>
  </div>

  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search users</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Name, email, city...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="table-container" *ngIf="!loading; else loadingTpl">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
            <td mat-cell *matCellDef="let u">{{ u.id }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
            <td mat-cell *matCellDef="let u">
              <div class="user-name">{{ u.firstName }} {{ u.lastName }}</div>
            </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
          </ng-container>

          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef>Phone</th>
            <td mat-cell *matCellDef="let u">{{ u.phone || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="bloodGroup">
            <th mat-header-cell *matHeaderCellDef>Blood Group</th>
            <td mat-cell *matCellDef="let u">
              <span class="blood-group-chip" *ngIf="u.bloodGroup">{{ u.bloodGroup }}</span>
              <span *ngIf="!u.bloodGroup">—</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="city">
            <th mat-header-cell *matHeaderCellDef>City</th>
            <td mat-cell *matCellDef="let u">{{ u.city || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Role</th>
            <td mat-cell *matCellDef="let u">
              <span class="role-chip" [class.admin]="u.role === 'ADMIN'">{{ u.role }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let u">
              <span class="status-badge" [class.APPROVED]="u.active" [class.REJECTED]="!u.active">
                {{ u.active ? 'Active' : 'Inactive' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let u" class="action-buttons">
              <button mat-icon-button [color]="u.active ? 'warn' : 'primary'"
                      (click)="toggleStatus(u)" [matTooltip]="u.active ? 'Deactivate' : 'Activate'">
                <mat-icon>{{ u.active ? 'block' : 'check_circle' }}</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteUser(u)" matTooltip="Delete user"
                      [disabled]="u.role === 'ADMIN'">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell no-data" colspan="9">No users found</td>
          </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>

<ng-template #loadingTpl>
  <div class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>
</ng-template>
