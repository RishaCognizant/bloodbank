<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">bloodtype</mat-icon>
      <div>
        <h3>Blood Bank</h3>
        <span class="role-badge">User Portal</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="user-info">
      <mat-icon class="avatar-icon">account_circle</mat-icon>
      <div>
        <div class="user-name">{{ auth.currentUser?.firstName }} {{ auth.currentUser?.lastName }}</div>
        <div class="blood-badge" *ngIf="auth.currentUser?.bloodGroup">{{ auth.currentUser?.bloodGroup }}</div>
      </div>
    </div>

    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.route"
         routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <a mat-list-item (click)="auth.logout()" class="logout-link">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle id="log">Logout</span>
      </a>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()"><mat-icon>menu</mat-icon></button>
      <span class="title">Blood Bank Portal</span>
      <span class="spacer"></span>
    </mat-toolbar>
    <main class="main-content"><router-outlet></router-outlet></main>
  </mat-sidenav-content>
</mat-sidenav-container>
