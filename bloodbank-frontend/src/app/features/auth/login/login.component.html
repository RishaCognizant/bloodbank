<div class="auth-wrapper">
  <mat-card class="auth-card">
    <div class="auth-header">
      <mat-icon class="blood-icon">bloodtype</mat-icon>
      <h1>Blood Bank</h1>
      <p>Management System</p>
    </div>

    <mat-card-content>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register">Register</a></p>
      </div>

      <mat-divider></mat-divider>
      <div class="demo-hint">
        <p><strong>Demo:</strong> admin&#64;bloodbank.com / Admin&#64;123</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
